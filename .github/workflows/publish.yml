name: Publish images

on:
  push:
    branches:
      - stable
    tags:
      - 'v*'

jobs:
  build-omniagent:
    name: Build omniagent
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omniagent
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent
          path: omniagent

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omniagent
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Run tests
        run: |
          cd omniagent
          cargo test --release

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: omniagent
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/omniagent.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniagent-image
          path: /tmp/omniagent.tar.gz
          retention-days: 1

  build-omni-dashboard:
    name: Build omni-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omni-dashboard
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard
          path: omni-dashboard

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omni-dashboard
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Lint and build
        run: |
          cd omni-dashboard
          npm ci
          npm run lint || true
          npm run build

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: omni-dashboard
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/omni-dashboard.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-dashboard-image
          path: /tmp/omni-dashboard.tar.gz
          retention-days: 1

  build-toolbox:
    name: Build toolbox
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omni-stack
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack
          path: omni-stack

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omni-stack-toolbox
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: omni-stack/services/toolbox
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/toolbox.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolbox-image
          path: /tmp/toolbox.tar.gz
          retention-days: 1

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [build-omniagent, build-omni-dashboard, build-toolbox]
    permissions:
      contents: read

    steps:
      - name: Checkout omni-deployer
        uses: actions/checkout@v4
        with:
          path: omni-deployer

      - name: Checkout omni-stack
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack
          path: omni-stack

      - name: Checkout omniagent
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent
          path: omniagent

      - name: Checkout omni-dashboard
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard
          path: omni-dashboard

      - name: Download omniagent image
        uses: actions/download-artifact@v4
        with:
          name: omniagent-image
          path: /tmp/images/omniagent

      - name: Download dashboard image
        uses: actions/download-artifact@v4
        with:
          name: omni-dashboard-image
          path: /tmp/images/dashboard

      - name: Download toolbox image
        uses: actions/download-artifact@v4
        with:
          name: toolbox-image
          path: /tmp/images/toolbox

      - name: Load images
        run: |
          for f in /tmp/images/*/*.tar.gz; do
            gunzip -c "$f" | docker load
          done

      - name: Run integration tests
        env:
          WORKSPACE_DIR: ${{ github.workspace }}
          OMNIAGENT_IMAGE: ghcr.io/nexuslbs/omniagent:${{ needs.build-omniagent.outputs.tags }}
          DASHBOARD_IMAGE: ghcr.io/nexuslbs/omni-dashboard:${{ needs.build-omni-dashboard.outputs.tags }}
          TOOLBOX_IMAGE: ghcr.io/nexuslbs/omni-stack-toolbox:${{ needs.build-toolbox.outputs.tags }}
        run: |
          cd omni-deployer
          python3 deploy.py ci

  publish:
    name: Tag repos and publish images
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: success()
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repos for tagging
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-deployer
          path: omni-deployer

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Tag omni-stack
        if: steps.version.outputs.IS_TAG == 'true'
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack
          path: omni-stack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag omniagent
        if: steps.version.outputs.IS_TAG == 'true'
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent
          path: omniagent
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag omni-dashboard
        if: steps.version.outputs.IS_TAG == 'true'
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard
          path: omni-dashboard
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tags to repos
        if: steps.version.outputs.IS_TAG == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for repo in omni-stack omniagent omni-dashboard; do
            cd "$repo"
            git tag "$VERSION"
            git push origin "$VERSION"
            cd ..
          done

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and push omniagent
        uses: actions/download-artifact@v4
        with:
          name: omniagent-image
          path: /tmp/push/omniagent

      - name: Download and push dashboard
        uses: actions/download-artifact@v4
        with:
          name: omni-dashboard-image
          path: /tmp/push/dashboard

      - name: Download and push toolbox
        uses: actions/download-artifact@v4
        with:
          name: toolbox-image
          path: /tmp/push/toolbox

      - name: Push omniagent image
        run: |
          gunzip -c /tmp/push/omniagent/omniagent.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omniagent'); do
            docker push "$tag"
          done

      - name: Push dashboard image
        run: |
          gunzip -c /tmp/push/dashboard/omni-dashboard.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omni-dashboard'); do
            docker push "$tag"
          done

      - name: Push toolbox image
        run: |
          gunzip -c /tmp/push/toolbox/toolbox.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omni-stack-toolbox'); do
            docker push "$tag"
          done
