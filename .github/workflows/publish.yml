name: Publish images

on:
  push:
    branches:
      - stable
    tags:
      - 'v*'

jobs:
  build-omniagent:
    name: Build omniagent
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tag: ${{ steps.image-tag.outputs.tag }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omniagent
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent
          path: omniagent

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omniagent
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Get single image tag
        id: image-tag
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "tag=$FIRST_TAG" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          cd omniagent
          cargo test --release

      - name: Build integration test binaries
        run: |
          cd omniagent
          # Build api_tests and plugin_tests without running (server needed)
          for test_file in api_tests plugin_tests; do
            cargo test --release --test "$test_file" --no-run 2>&1
            BIN=$(find target/release -name "$test_file-*" -type f ! -name '*.d' 2>/dev/null | head -1)
            cp "$BIN" "/tmp/$test_file"
          done

      - name: Upload integration test binaries
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-binaries
          path: |
            /tmp/api_tests
            /tmp/plugin_tests
          retention-days: 1

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: omniagent
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/omniagent.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniagent-image
          path: /tmp/omniagent.tar.gz
          retention-days: 1

  build-omni-dashboard:
    name: Build omni-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tag: ${{ steps.image-tag.outputs.tag }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omni-dashboard
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard
          path: omni-dashboard

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omni-dashboard
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Get single image tag
        id: image-tag
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "tag=$FIRST_TAG" >> "$GITHUB_OUTPUT"

      - name: Lint and build
        run: |
          cd omni-dashboard
          npm ci
          npm run lint || true
          npm run build

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: omni-dashboard
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/omni-dashboard.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-dashboard-image
          path: /tmp/omni-dashboard.tar.gz
          retention-days: 1

  build-toolbox:
    name: Build toolbox
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tag: ${{ steps.image-tag.outputs.tag }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omni-stack
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack
          path: omni-stack

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omni-stack-toolbox
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Get single image tag
        id: image-tag
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "tag=$FIRST_TAG" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: omni-stack/services/toolbox
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/toolbox.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolbox-image
          path: /tmp/toolbox.tar.gz
          retention-days: 1

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [build-omniagent, build-omni-dashboard, build-toolbox]
    permissions:
      contents: read

    steps:
      - name: Checkout omni-deployer
        uses: actions/checkout@v4
        with:
          path: omni-deployer

      - name: Checkout omni-stack
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack
          path: omni-stack

      - name: Checkout omniagent
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent
          path: omniagent

      - name: Checkout omni-dashboard
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard
          path: omni-dashboard

      - name: Download omniagent image
        uses: actions/download-artifact@v4
        with:
          name: omniagent-image
          path: /tmp/images/omniagent

      - name: Download dashboard image
        uses: actions/download-artifact@v4
        with:
          name: omni-dashboard-image
          path: /tmp/images/dashboard

      - name: Download toolbox image
        uses: actions/download-artifact@v4
        with:
          name: toolbox-image
          path: /tmp/images/toolbox

      - name: Load images
        run: |
          for f in /tmp/images/*/*.tar.gz; do
            gunzip -c "$f" | docker load
          done

      - name: Run integration tests
        env:
          WORKSPACE_DIR: ${{ github.workspace }}
          OMNIAGENT_IMAGE: ghcr.io/nexuslbs/omniagent:${{ needs.build-omniagent.outputs.tag }}
          DASHBOARD_IMAGE: ghcr.io/nexuslbs/omni-dashboard:${{ needs.build-omni-dashboard.outputs.tag }}
          TOOLBOX_IMAGE: ghcr.io/nexuslbs/omni-stack-toolbox:${{ needs.build-toolbox.outputs.tag }}
        run: |
          cd omni-deployer
          python3 deploy.py ci

      - name: Download integration test binaries
        uses: actions/download-artifact@v4
        with:
          name: integration-test-binaries
          path: /tmp/integration-tests

      - name: Run Rust integration tests inside container
        run: |
          chmod +x /tmp/integration-tests/*
          CONTAINER_NAME="omnidev-omniagent-1"
          cd omni-deployer
          COMPOSE_CMD="docker compose -f ${{ github.workspace }}/omni-stack/docker-compose.yml --env-file omni.env"
          for test_bin in api_tests plugin_tests; do
            echo "=== Copying $test_bin ==="
            docker cp "/tmp/integration-tests/$test_bin" "$CONTAINER_NAME:/tmp/$test_bin"
            echo "=== Running $test_bin (--ignored) ==="
            $COMPOSE_CMD exec -T omniagent "/tmp/$test_bin" --ignored
          done

  publish:
    name: Publish stable + images
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: success()
    permissions:
      contents: write
      packages: write

    steps:
      # ── Determine version info ─────────────────────────────
      - name: Checkout omni-deployer (for ref info)
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-deployer
          path: omni-deployer

      - name: Determine version
        id: version
        run: |
          IS_TAG=false
          VERSION=""
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            IS_TAG=true
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_TAG=$IS_TAG" >> $GITHUB_OUTPUT

      # ── Update omni-stack ───────────────────────────────────
      - name: Checkout omni-stack
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack
          path: omni-stack
          token: ${{ secrets.GH_PAT }}

      - name: Push omni-stack stable branch
        run: |
          cd omni-stack
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/nexuslbs/omni-stack.git
          git push origin HEAD:stable --force

      - name: Tag omni-stack
        if: steps.version.outputs.IS_TAG == 'true'
        run: |
          cd omni-stack
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      # ── Update omniagent ────────────────────────────────────
      - name: Checkout omniagent
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent
          path: omniagent
          token: ${{ secrets.GH_PAT }}

      - name: Push omniagent stable branch
        run: |
          cd omniagent
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/nexuslbs/omniagent.git
          git push origin HEAD:stable --force

      - name: Tag omniagent
        if: steps.version.outputs.IS_TAG == 'true'
        run: |
          cd omniagent
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      # ── Update omni-dashboard ───────────────────────────────
      - name: Checkout omni-dashboard
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard
          path: omni-dashboard
          token: ${{ secrets.GH_PAT }}

      - name: Push omni-dashboard stable branch
        run: |
          cd omni-dashboard
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/nexuslbs/omni-dashboard.git
          git push origin HEAD:stable --force

      - name: Tag omni-dashboard
        if: steps.version.outputs.IS_TAG == 'true'
        run: |
          cd omni-dashboard
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      # ── Publish Docker images ──────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and push omniagent
        uses: actions/download-artifact@v4
        with:
          name: omniagent-image
          path: /tmp/push/omniagent

      - name: Download and push dashboard
        uses: actions/download-artifact@v4
        with:
          name: omni-dashboard-image
          path: /tmp/push/dashboard

      - name: Download and push toolbox
        uses: actions/download-artifact@v4
        with:
          name: toolbox-image
          path: /tmp/push/toolbox

      - name: Push omniagent image
        run: |
          gunzip -c /tmp/push/omniagent/omniagent.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omniagent'); do
            docker push "$tag"
          done

      - name: Push dashboard image
        run: |
          gunzip -c /tmp/push/dashboard/omni-dashboard.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omni-dashboard'); do
            docker push "$tag"
          done

      - name: Push toolbox image
        run: |
          gunzip -c /tmp/push/toolbox/toolbox.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omni-stack-toolbox'); do
            docker push "$tag"
          done
