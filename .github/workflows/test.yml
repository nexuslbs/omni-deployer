name: CI Tests

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run integration tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout omni-deployer
        uses: actions/checkout@v4

      - name: Checkout omni-stack
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack
          path: omni-stack

      - name: Checkout omniagent
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent
          path: omniagent

      - name: Checkout omni-dashboard
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard
          path: omni-dashboard

      - name: Run deploy (CI mode)
        env:
          WORKSPACE_DIR: ${{ github.workspace }}
        run: bash deploy.sh ci
